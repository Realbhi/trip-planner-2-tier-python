# ─────────────────────────────────────────────────────────────────
#  Tier 2: Backend — Python Flask API
#  ClusterIP service: only reachable inside the cluster
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-backend
  labels:
    app: trip-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-backend
  template:
    metadata:
      labels:
        app: trip-backend
        tier: backend
    spec:
      containers:
        - name: trip-backend
          image: trip-backend:latest        # replace with your registry path
          imagePullPolicy: IfNotPresent     # use Always when pulling from a registry
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: trip-backend-service      # DNS name frontend uses to reach backend
  labels:
    app: trip-backend
spec:
  type: ClusterIP                 # not exposed outside the cluster
  selector:
    app: trip-backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
