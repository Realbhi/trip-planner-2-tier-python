# ─────────────────────────────────────────────────────────────────
#  Tier 1: Frontend — Node.js Express
#  NodePort service: accessible from outside the cluster
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-frontend
  labels:
    app: trip-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-frontend
  template:
    metadata:
      labels:
        app: trip-frontend
        tier: frontend
    spec:
      containers:
        - name: trip-frontend
          image: trip-frontend:latest       # replace with your registry path
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "http://trip-backend-service:5000"   # k8s DNS magic
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: trip-frontend-service
  labels:
    app: trip-frontend
spec:
  type: NodePort                  # exposes the app on <NodeIP>:30080
  selector:
    app: trip-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080             # access via http://<node-ip>:30080
      protocol: TCP
